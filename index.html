<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더 위젯</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
  }

  .widget {
    width: 300px;
    background: #ffffff;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 24px rgba(100, 149, 200, 0.12);
    border: 1px solid #e8f0fb;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .nav-group { display: flex; gap: 4px; }

  .nav-btn, .refresh-btn {
    width: 26px; height: 26px;
    border: 1px solid #dde8f5;
    border-radius: 8px;
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #7a9cc4;
    font-size: 14px;
    transition: background 0.15s;
  }
  .nav-btn:hover, .refresh-btn:hover { background: #f0f6ff; }

  .month-label {
    font-size: 14px;
    font-weight: 600;
    color: #3a5f8a;
    letter-spacing: 0.02em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-btn.spinning { animation: spin 0.5s linear; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .weekday {
    text-align: center;
    font-size: 10px;
    font-weight: 500;
    color: #a0b8d4;
    padding: 3px 0;
  }
  .weekday:last-child { color: #c9a0c8; }

  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #4a6a8a;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    flex-direction: column;
  }
  .day:hover { background: #f0f6ff; }
  .day.empty { cursor: default; pointer-events: none; }

  .day.today {
    background: #D6EEFF;
    color: #2a6fa5;
    font-weight: 600;
  }
  .day.today:hover { background: #c4e2ff; }

  .day.has-event::after {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #7aafdd;
    position: absolute;
    bottom: 3px;
  }
  .day.has-important {
    background: #fff0f6;
  }
  .day.has-important::after {
    background: #e8819a;
  }
  .day.today.has-important {
    background: #ffdceb;
    color: #2a6fa5;
  }

  .divider {
    border: none;
    border-top: 1px solid #f0f5fb;
    margin: 12px 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: #a0b8d4;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .event-list { display: flex; flex-direction: column; gap: 4px; min-height: 28px; }

  .event-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 10px;
    background: #f7faff;
    font-size: 11.5px;
    color: #3a5f8a;
    cursor: default;
    transition: background 0.12s;
  }
  .event-item:hover { background: #edf4ff; }

  .event-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-normal { background: #7aafdd; }
  .dot-important { background: #e8819a; }

  .event-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }

  .event-date {
    font-size: 10px;
    color: #a0b8d4;
    white-space: nowrap;
  }

  .empty-msg {
    font-size: 11px;
    color: #b8cfe4;
    text-align: center;
    padding: 6px 0;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .legend { display: flex; gap: 10px; }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 9.5px; color: #b0c8e0;
  }
  .legend-dot { width: 5px; height: 5px; border-radius: 50%; }

  .update-time { font-size: 9.5px; color: #c8daea; }

  .error-msg {
    font-size: 10.5px;
    color: #e8819a;
    text-align: center;
    padding: 4px 0;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="nav-group">
      <button class="nav-btn" id="prev">‹</button>
      <button class="nav-btn" id="next">›</button>
    </div>
    <span class="month-label" id="month-label"></span>
    <button class="refresh-btn" id="refresh" title="새로고침">↻</button>
  </div>

  <div class="weekdays">
    <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
    <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div>
    <div class="weekday">토</div>
  </div>
  <div class="days" id="days-grid"></div>

  <hr class="divider">
  <div class="section-label" id="section-label">이번 달 일정</div>
  <div class="event-list" id="event-list">
    <div class="empty-msg">불러오는 중 . . .</div>
  </div>

  <div class="footer">
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#7aafdd;"></div>일정
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#e8819a;"></div>중요
      </div>
    </div>
    <div class="update-time" id="update-time"></div>
  </div>
</div>

<script>
  let currentDate = new Date();
  let events = [];
  let selectedDayKey = null;

  function pad(n) { return String(n).padStart(2, '0'); }

  function renderCalendar() {
    const y = currentDate.getFullYear();
    const m = currentDate.getMonth();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('month-label').textContent = months[m] + ' ' + y;

    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const today = new Date();

    const eventMap = {};
    events.forEach(e => {
      if (!e.date) return;
      const key = e.date.substring(0, 10);
      if (!eventMap[key]) eventMap[key] = { important: false };
      if (e.important) eventMap[key].important = true;
    });

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'day';
      el.textContent = d;
      const key = y + '-' + pad(m + 1) + '-' + pad(d);
      const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
      if (isToday) el.classList.add('today');
      if (eventMap[key]) {
        el.classList.add('has-event');
        if (eventMap[key].important) el.classList.add('has-important');
      }
      el.addEventListener('click', () => {
        selectedDayKey = key;
        showDayEvents(d, key);
      });
      grid.appendChild(el);
    }
  }

  function showDayEvents(day, key) {
    const dayEvts = events.filter(e => e.date && e.date.startsWith(key));
    document.getElementById('section-label').textContent =
      (currentDate.getMonth() + 1) + '월 ' + day + '일';
    renderEvents(dayEvts);
  }

  function showMonthEvents() {
    const y = currentDate.getFullYear();
    const m = currentDate.getMonth();
    const monthEvts = events.filter(e => {
      if (!e.date) return false;
      const d = new Date(e.date);
      return d.getFullYear() === y && d.getMonth() === m;
    });
    document.getElementById('section-label').textContent =
      '이번 달 일정 (' + monthEvts.length + ')';
    renderEvents(monthEvts);
  }

  function renderEvents(evts) {
    const list = document.getElementById('event-list');
    list.innerHTML = '';
    if (evts.length === 0) {
      list.innerHTML = '<div class="empty-msg">일정이 없어요 ෆ</div>';
      return;
    }
    evts.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    evts.forEach(e => {
      const item = document.createElement('div');
      item.className = 'event-item ' + (e.important ? 'pink' : 'blue');
      const dot = document.createElement('div');
      dot.className = 'event-dot ' + (e.important ? 'dot-important' : 'dot-normal');
      const name = document.createElement('span');
      name.className = 'event-name';
      name.textContent = e.name;
      const right = document.createElement('div');
      right.style.cssText = 'display:flex;align-items:center;gap:6px;flex-shrink:0';
      if (e.type) {
        const badge = document.createElement('span');
        const bg = {'체험단':'#D6EEFF','협찬':'#FFE0EC','RT이벤트':'#E4F5DC','기타':'#F0F0F0'};
        const tc = {'체험단':'#2A6FA5','협찬':'#B04060','RT이벤트':'#3A7A30','기타':'#888'};
        badge.style.cssText = `font-size:9px;padding:2px 7px;border-radius:20px;background:${bg[e.type]||'#F0F0F0'};color:${tc[e.type]||'#888'};font-weight:700;white-space:nowrap`;
        badge.textContent = e.type;
        right.appendChild(badge);
      }
      const date = document.createElement('span');
      date.className = 'event-date';
      if (e.date) date.textContent = e.date.substring(5, 10).replace('-', '/');
      right.appendChild(date);
      item.appendChild(dot);
      item.appendChild(name);
      item.appendChild(right);
      list.appendChild(item);
    });
  }

  async function fetchEvents() {
    const btn = document.getElementById('refresh');
    btn.classList.add('spinning');
    try {
      const res = await fetch('/api/events');
      if (!res.ok) throw new Error('API 오류');
      const data = await res.json();
      events = data.events || [];
      renderCalendar();
      if (selectedDayKey) {
        const day = parseInt(selectedDayKey.substring(8, 10));
        showDayEvents(day, selectedDayKey);
      } else {
        showMonthEvents();
      }
      const now = new Date();
      document.getElementById('update-time').textContent =
        now.getHours() + ':' + pad(now.getMinutes());
    } catch (e) {
      document.getElementById('event-list').innerHTML =
        '<div class="error-msg">불러오기 실패 — 환경변수를 확인해 주세요</div>';
    }
    btn.classList.remove('spinning');
  }

  document.getElementById('prev').addEventListener('click', () => {
    selectedDayKey = null;
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
    showMonthEvents();
  });
  document.getElementById('next').addEventListener('click', () => {
    selectedDayKey = null;
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
    showMonthEvents();
  });
  document.getElementById('refresh').addEventListener('click', fetchEvents);

  renderCalendar();
  fetchEvents();
</script>
</body>
</html>
